<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soundboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --accent: #e8ff47;
  --accent2: #ff4757;
  --text: #f0f0f0;
  --muted: #555;
  --r: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding-bottom: 80px;
}
button { cursor: pointer; border: none; font-family: 'DM Mono', monospace; border-radius: var(--r); transition: all .15s; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 5px; color: var(--accent); }
.logo span { color: var(--muted); }
.btn-admin {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
  padding: 8px 16px; font-size: .72rem; letter-spacing: 1px; text-transform: uppercase;
}
.btn-admin:hover { color: var(--text); border-color: var(--muted); }

/* CONTROLS */
.controls { padding: 16px 28px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .4; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: .8rem;
  padding: 9px 12px 9px 34px; border-radius: var(--r); outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.cats { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-btn {
  background: var(--surface); color: var(--muted); border: 1px solid var(--border);
  padding: 7px 13px; font-size: .68rem; text-transform: uppercase; letter-spacing: 1px;
}
.cat-btn:hover { color: var(--text); }
.cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

/* COUNT */
.count-bar { padding: 0 28px 10px; font-size: .68rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

/* GRID */
.grid {
  padding: 0 28px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 18px 16px; cursor: pointer; position: relative;
  display: flex; flex-direction: column; gap: 8px;
  transition: border-color .15s, transform .15s;
  user-select: none;
}
.card:hover { border-color: #444; transform: translateY(-1px); }
.card.playing { border-color: var(--accent); background: var(--surface2); }
.card-icon { font-size: 1.4rem; }
.card-name { font-size: .82rem; line-height: 1.3; flex: 1; }
.card-cat { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.pip {
  position: absolute; top: 11px; right: 11px;
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  opacity: 0; transition: opacity .2s;
}
.card.playing .pip { opacity: 1; animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }

.empty { grid-column:1/-1; text-align:center; color:var(--muted); padding:60px 0; font-size:.82rem; line-height:2; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.85); z-index: 100;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  width: 460px; max-width: 95vw; max-height: 92vh; overflow-y: auto; padding: 28px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
  letter-spacing: 3px; color: var(--accent); margin-bottom: 20px;
}
.field { margin-bottom: 14px; }
.field label { display:block; font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:5px; }
.field input, .field select {
  width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
  font-family:'DM Mono',monospace; font-size:.82rem; padding:9px 12px;
  border-radius:var(--r); outline:none; transition:border-color .2s;
}
.field input:focus, .field select:focus { border-color:var(--accent); }
.field select option { background:var(--surface); }

.mode-row { display:flex; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:18px; }
.mode-btn {
  flex:1; padding:10px; background:transparent; color:var(--muted);
  font-size:.72rem; text-transform:uppercase; letter-spacing:1px; border-radius:0;
}
.mode-btn.active { background:var(--accent); color:#000; }

.rec-btn {
  width:100%; padding:14px; font-size:.78rem; letter-spacing:2px; text-transform:uppercase;
  background:var(--accent2); color:#fff; margin-bottom:8px;
}
.rec-btn.recording { animation:breathe 1s infinite; }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.65} }
.rec-status { font-size:.72rem; color:var(--muted); text-align:center; margin-bottom:10px; min-height:1.2em; }
audio { width:100%; margin-bottom:10px; display:none; }
audio.show { display:block; }

.btn-primary {
  width:100%; padding:13px; background:var(--accent); color:#000;
  font-size:.78rem; letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-top:6px;
}
.btn-primary:hover { filter:brightness(1.08); }
.btn-primary:disabled { opacity:.35; cursor:not-allowed; filter:none; }
.btn-ghost {
  width:100%; padding:11px; background:transparent; color:var(--muted);
  font-size:.72rem; letter-spacing:1px; text-transform:uppercase; margin-top:8px;
}
.btn-ghost:hover { color:var(--text); }

.divider { border-top:1px solid var(--border); margin:22px 0; }
.section-label { font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px; }
.sound-row {
  display:flex; align-items:center; gap:10px;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.sound-row-info { flex:1; }
.sound-row-name { font-size:.8rem; }
.sound-row-cat { font-size:.62rem; color:var(--muted); margin-top:2px; }
.btn-del {
  background:transparent; color:var(--accent2); border:1px solid var(--accent2);
  padding:4px 9px; font-size:.65rem; letter-spacing:1px; opacity:.6;
}
.btn-del:hover { opacity:1; }
.btn-edit {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  padding:4px 9px; font-size:.65rem; letter-spacing:1px; opacity:.6;
}
.btn-edit:hover { opacity:1; color:var(--text); }
.btn-save { background:var(--accent); color:#000; padding:4px 10px; font-size:.65rem; letter-spacing:1px; }
.btn-xs { background:transparent; color:var(--muted); border:1px solid var(--border); padding:4px 8px; font-size:.65rem; }
.btn-xs:hover { color:var(--text); }
.row-check { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; flex-shrink:0; }
.edit-fields { display:flex; flex-direction:column; gap:5px; flex:1; }
.edit-input {
  background:var(--bg); border:1px solid var(--border); color:var(--text);
  font-family:'DM Mono',monospace; font-size:.75rem; padding:5px 8px;
  border-radius:var(--r); outline:none; width:100%;
}
.edit-input:focus { border-color:var(--accent); }
.bulk-bar {
  display:flex; align-items:center; gap:10px;
  padding:10px 0; border-top:1px solid var(--border); margin-top:6px;
}
.bulk-bar span { font-size:.72rem; color:var(--muted); flex:1; }

.msg {
  font-size:.75rem; padding:9px 12px; border-radius:var(--r); margin-bottom:12px; display:none;
}
.msg.ok { display:block; background:#1a2e0e; border:1px solid #3d6b1e; color:#8bc34a; }
.msg.err { display:block; background:#2e0e0e; border:1px solid #6b1e1e; color:#e57373; }

/* VOLUME SLIDER */
.vol-wrap { display:flex; align-items:center; gap:8px; }
.vol-wrap svg { opacity:.35; flex-shrink:0; }
#volSlider {
  -webkit-appearance:none; appearance:none;
  width:72px; height:3px; border-radius:2px;
  background:var(--border); outline:none; cursor:pointer;
}
#volSlider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:12px; height:12px; border-radius:50%;
  background:var(--accent); cursor:pointer;
}
#volSlider::-moz-range-thumb {
  width:12px; height:12px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:none;
}

/* CARD META ROW */
.card-meta { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
.card-dur { font-size:.6rem; color:var(--muted); }
.card-btns { display:flex; gap:4px; }
.card-pin, .card-key {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  font-size:.58rem; padding:2px 6px; border-radius:2px; line-height:1.5;
  opacity:0; transition:opacity .15s, color .15s, border-color .15s;
}
.card:hover .card-pin,
.card:hover .card-key { opacity:1; }
.card-pin.active,
.card-key.active { color:var(--accent); border-color:var(--accent); opacity:1; }
.card-key.assigning { color:var(--accent2); border-color:var(--accent2); opacity:1; animation:breathe 1s infinite; }

/* LOGIN */
.login-wrap { display:flex; flex-direction:column; gap:14px; }
</style>
</head>
<body>

<header>
  <div class="logo">SOUND<span>BOARD</span></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="vol-wrap">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(+this.value)"/>
    </div>
    <button class="btn-admin" onclick="copyShareLink()" id="shareBtn">⤴ Share</button>
    <button class="btn-admin" onclick="openAdmin()">⚙ Admin</button>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="search sounds..." oninput="render()"/>
  </div>
  <div class="cats" id="cats"></div>
</div>
<div class="count-bar" id="countBar"></div>
<div class="grid" id="grid"></div>

<!-- ADMIN MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeAdmin()">
  <div class="modal">
    <div class="modal-title">ADMIN PANEL</div>
    <div id="loginWrap" class="login-wrap">
      <div class="field">
        <label>Username</label>
        <input type="text" id="unInput" placeholder="username" onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="msg" id="loginMsg"></div>
      <button class="btn-primary" onclick="doLogin()">UNLOCK</button>
      <button class="btn-ghost" onclick="closeAdmin()">CANCEL</button>
    </div>
    <div id="adminWrap" style="display:none">
      <div id="adminUserLine" style="font-size:.68rem;color:var(--muted);margin-bottom:16px;letter-spacing:1px;"></div>
      <div class="msg" id="adminMsg"></div>
      <div class="mode-row">
        <button class="mode-btn active" id="modeRecord" onclick="setMode('record')">⏺ Record</button>
        <button class="mode-btn" id="modeUpload" onclick="setMode('upload')">↑ Upload</button>
      </div>

      <div class="field">
        <label>Quote name</label>
        <input type="text" id="soundName" placeholder="e.g. That's what she said"/>
      </div>
      <div class="field">
        <label>Category</label>
        <input type="text" id="soundCat" placeholder="e.g. Office, Reactions, Classics" list="catList"/>
        <datalist id="catList"></datalist>
      </div>

      <!-- RECORD MODE -->
      <div id="recordPanel">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()">⏺ START RECORDING</button>
        <div class="rec-status" id="recStatus">Click to start recording</div>
        <audio id="recPreview" controls class=""></audio>
        <button class="btn-primary" id="submitRecBtn" onclick="submitRecording()" disabled>SAVE RECORDING</button>
      </div>

      <!-- UPLOAD MODE -->
      <div id="uploadPanel" style="display:none">
        <div class="field">
          <label>Audio file (mp3, wav, ogg, webm, m4a)</label>
          <input type="file" id="fileInput" accept="audio/*"/>
        </div>
        <button class="btn-primary" onclick="submitUpload()">UPLOAD & SAVE</button>
      </div>

      <button class="btn-ghost" onclick="closeAdmin()">CLOSE</button>

      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="section-label" style="margin-bottom:0">Manage sounds</div>
        <button class="btn-xs" onclick="downloadBackup()">↓ Backup</button>
      </div>
      <div id="soundList"></div>
      <div class="bulk-bar" id="bulkBar" style="display:none">
        <span id="bulkCount"></span>
        <button class="btn-del" onclick="deleteSelected()">DELETE SELECTED</button>
        <button class="btn-xs" onclick="clearSelection()">CLEAR</button>
      </div>
    </div>
  </div>
</div>

<script>
let sounds = [];
let activeCategory = 'all';
let authToken     = '';
let adminUsername = '';
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
let recExt = '.webm';
let isRecording = false;
let currentAudio = null;
let currentCard = null;

// ── LOAD & RENDER ──────────────────────────────

async function loadSounds() {
  const r = await fetch('/api/sounds');
  sounds = await r.json();
  render();
}

function getCategories() {
  const cats = [...new Set(sounds.map(s => s.category))].sort();
  return cats;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cats = getCategories();

  // Category tabs
  const catsEl = document.getElementById('cats');
  catsEl.innerHTML = `<button class="cat-btn ${activeCategory==='all'?'active':''}" onclick="setCategory('all')">All</button>` +
    cats.map(c => `<button class="cat-btn ${activeCategory===c?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('');

  // Filter
  let filtered = sounds.filter(s => {
    const matchCat = activeCategory === 'all' || s.category === activeCategory;
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('countBar').textContent = `${filtered.length} sound${filtered.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No sounds found.<br><span style="color:#333">Add some via Admin →</span></div>';
    return;
  }

  filtered.sort((a, b) => (pinned.has(b.id) ? 1 : 0) - (pinned.has(a.id) ? 1 : 0));

  grid.innerHTML = filtered.map(s => `
    <div class="card" id="card-${s.id}" onclick="playSound('${s.id}', '/sounds/${s.filename}')">
      <div class="pip"></div>
      <div class="card-icon">🔊</div>
      <div class="card-name">${escHtml(s.name)}</div>
      <div class="card-cat">${escHtml(s.category)}</div>
      <div class="card-meta">
        <div class="card-dur" id="dur-${s.id}">${durations[s.id] || ''}</div>
        <div class="card-btns">
          <button class="card-pin${pinned.has(s.id)?' active':''}" onclick="togglePin('${s.id}',event)" title="Pin to top">★</button>
          <button class="card-key${keybindings[s.id]?' active':''}" onclick="startKeyAssign('${s.id}',event)" title="Assign keyboard shortcut">${keybindings[s.id] ? escHtml(keybindings[s.id]) : '+'}</button>
        </div>
      </div>
    </div>
  `).join('');
  loadDurations(filtered);
}

function setCategory(cat) {
  activeCategory = cat;
  render();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PLAYBACK ──────────────────────────────────

function playSound(id, url) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    if (currentCard) currentCard.classList.remove('playing');
  }
  const card = document.getElementById('card-' + id);
  const audio = new Audio(url);
  audio.volume = globalVolume;
  currentAudio = audio;
  currentCard = card;
  card.classList.add('playing');
  audio.play();
  audio.onended = () => { card.classList.remove('playing'); currentAudio = null; currentCard = null; };
  audio.onerror = () => { card.classList.remove('playing'); };
}

// ── ADMIN ─────────────────────────────────────

function openAdmin() {
  document.getElementById('overlay').classList.add('open');
  if (authToken) showAdminPanel();
}
function closeAdmin() {
  document.getElementById('overlay').classList.remove('open');
}

async function doLogin() {
  const username = document.getElementById('unInput').value.trim();
  const pw       = document.getElementById('pwInput').value;
  if (!username || !pw) return;
  const msg = document.getElementById('loginMsg');
  msg.textContent = '';
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password: pw })
    });
    if (!r.ok) { msg.textContent = 'Invalid credentials.'; return; }
    const d = await r.json();
    authToken     = d.token;
    adminUsername = d.username;
    showAdminPanel();
  } catch { msg.textContent = 'Server error.'; }
}

function showAdminPanel() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  document.getElementById('adminUserLine').textContent = `logged in as ${adminUsername}`;
  refreshSoundList();
  updateCatDatalist();
}

function setMode(mode) {
  document.getElementById('modeRecord').classList.toggle('active', mode==='record');
  document.getElementById('modeUpload').classList.toggle('active', mode==='upload');
  document.getElementById('recordPanel').style.display = mode==='record' ? 'block' : 'none';
  document.getElementById('uploadPanel').style.display = mode==='upload' ? 'block' : 'none';
}

// ── RECORDING ─────────────────────────────────

async function toggleRecord() {
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recBtn').textContent = '⏺ START RECORDING';
    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('recStatus').textContent = 'Processing...';
  } else {
    recordedChunks = [];
    recordedBlob = null;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const preferredMime = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
      mediaRecorder = new MediaRecorder(stream, preferredMime ? { mimeType: preferredMime } : {});
      const recMime = mediaRecorder.mimeType || 'audio/webm';
      recExt = recMime.includes('ogg') ? '.ogg' : recMime.includes('mp4') ? '.m4a' : '.webm';
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: recMime });
        const url = URL.createObjectURL(recordedBlob);
        const preview = document.getElementById('recPreview');
        preview.src = url;
        preview.classList.add('show');
        document.getElementById('recStatus').textContent = 'Recording ready — preview above';
        document.getElementById('submitRecBtn').disabled = false;
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('recBtn').textContent = '⏹ STOP RECORDING';
      document.getElementById('recBtn').classList.add('recording');
      document.getElementById('recStatus').textContent = 'Recording... click stop when done';
      document.getElementById('submitRecBtn').disabled = true;
    } catch(e) {
      document.getElementById('recStatus').textContent = 'Mic access denied. Check browser permissions.';
    }
  }
}

async function submitRecording() {
  if (!recordedBlob) return;
  const name = document.getElementById('soundName').value.trim();
  const cat = document.getElementById('soundCat').value.trim() || 'General';
  if (!name) { showMsg('adminMsg', 'Enter a name for the quote.', false); return; }

  const fd = new FormData();
  fd.append('token', authToken);
  fd.append('name', name);
  fd.append('category', cat);
  fd.append('file', recordedBlob, 'recording' + recExt);

  const r = await fetch('/api/sounds', { method: 'POST', body: fd });
  if (r.ok) {
    showMsg('adminMsg', 'Sound saved!', true);
    document.getElementById('soundName').value = '';
    document.getElementById('recPreview').classList.remove('show');
    document.getElementById('submitRecBtn').disabled = true;
    document.getElementById('recStatus').textContent = 'Click to start recording';
    recordedBlob = null;
    await loadSounds();
    refreshSoundList();
    updateCatDatalist();
  } else {
    const d = await r.json();
    showMsg('adminMsg', d.error || 'Error saving sound.', false);
  }
}

async function submitUpload() {
  const name = document.getElementById('soundName').value.trim();
  const cat = document.getElementById('soundCat').value.trim() || 'General';
  const file = document.getElementById('fileInput').files[0];
  if (!name) { showMsg('adminMsg', 'Enter a name for the quote.', false); return; }
  if (!file) { showMsg('adminMsg', 'Select an audio file.', false); return; }

  const fd = new FormData();
  fd.append('token', authToken);
  fd.append('name', name);
  fd.append('category', cat);
  fd.append('file', file);

  const r = await fetch('/api/sounds', { method: 'POST', body: fd });
  if (r.ok) {
    showMsg('adminMsg', 'Sound uploaded!', true);
    document.getElementById('soundName').value = '';
    document.getElementById('fileInput').value = '';
    await loadSounds();
    refreshSoundList();
    updateCatDatalist();
  } else {
    const d = await r.json();
    showMsg('adminMsg', d.error || 'Error uploading.', false);
  }
}

// ── MANAGE SOUNDS ─────────────────────────────

let selectedIds = new Set();

function refreshSoundList() {
  selectedIds.clear();
  updateBulkBar();
  const el = document.getElementById('soundList');
  if (!sounds.length) { el.innerHTML = '<div style="color:var(--muted);font-size:.75rem">No sounds yet.</div>'; return; }
  el.innerHTML = sounds.map(s => `
    <div class="sound-row" id="row-${s.id}">
      <input type="checkbox" class="row-check" onchange="toggleSelect('${s.id}')"/>
      <div class="sound-row-info">
        <div class="sound-row-name">${escHtml(s.name)}</div>
        <div class="sound-row-cat">${escHtml(s.category)}</div>
      </div>
      <button class="btn-edit" onclick="startEdit('${s.id}')">EDIT</button>
      <button class="btn-del" onclick="deleteSound('${s.id}')">DEL</button>
    </div>
  `).join('');
}

function startEdit(id) {
  const s = sounds.find(s => s.id === id);
  if (!s) return;
  document.getElementById('row-' + id).innerHTML = `
    <div class="edit-fields">
      <input class="edit-input" id="ename-${id}" value="${escHtml(s.name)}" placeholder="Name"/>
      <input class="edit-input" id="ecat-${id}" value="${escHtml(s.category)}" placeholder="Category" list="catList"/>
    </div>
    <button class="btn-save" onclick="saveEdit('${id}')">SAVE</button>
    <button class="btn-xs" onclick="refreshSoundList()">✕</button>
  `;
  document.getElementById('ename-' + id).focus();
}

async function saveEdit(id) {
  const name = document.getElementById('ename-' + id).value.trim();
  const cat  = document.getElementById('ecat-'  + id).value.trim() || 'General';
  if (!name) return;
  const r = await fetch('/api/sounds/' + id, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ token: authToken, name, category: cat })
  });
  if (r.ok) {
    await loadSounds();
    refreshSoundList();
    updateCatDatalist();
  } else {
    const d = await r.json();
    showMsg('adminMsg', d.error || 'Update failed.', false);
  }
}

function toggleSelect(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  if (!bar) return;
  bar.style.display = selectedIds.size ? 'flex' : 'none';
  const el = document.getElementById('bulkCount');
  if (el) el.textContent = `${selectedIds.size} selected`;
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.row-check').forEach(c => c.checked = false);
  updateBulkBar();
}

async function deleteSelected() {
  if (!selectedIds.size) return;
  if (!confirm(`Delete ${selectedIds.size} sound${selectedIds.size > 1 ? 's' : ''}?`)) return;
  for (const id of [...selectedIds]) {
    await fetch('/api/sounds/' + id, {
      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token: authToken })
    });
  }
  selectedIds.clear();
  await loadSounds();
  refreshSoundList();
}

async function deleteSound(id) {
  if (!confirm('Delete this sound?')) return;
  const r = await fetch('/api/sounds/'+id, {
    method: 'DELETE',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({token: authToken})
  });
  if (r.ok) {
    await loadSounds();
    refreshSoundList();
  } else {
    const d = await r.json();
    showMsg('adminMsg', d.error || 'Delete failed.', false);
  }
}

async function downloadBackup() {
  const r = await fetch('/api/backup', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ token: authToken })
  });
  if (!r.ok) { showMsg('adminMsg', 'Backup failed.', false); return; }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'soundboard-backup.zip'; a.click();
  URL.revokeObjectURL(url);
}

function updateCatDatalist() {
  document.getElementById('catList').innerHTML = getCategories()
    .map(c => `<option value="${escHtml(c)}">`).join('');
}

// ── UTILS ─────────────────────────────────────

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.className = 'msg'; }, 3500);
}

// ── SHARE ─────────────────────────────────────

function copyShareLink() {
  const url = window.location.href;
  const btn = document.getElementById('shareBtn');
  const flash = () => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = orig, 2000);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).then(flash);
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    flash();
  }
}

// ── VOLUME ────────────────────────────────────
let globalVolume = parseFloat(localStorage.getItem('volume') ?? '1');

function setVolume(v) {
  globalVolume = v;
  localStorage.setItem('volume', v);
  if (currentAudio) currentAudio.volume = v;
}

// ── PINNED ────────────────────────────────────
let pinned = new Set(JSON.parse(localStorage.getItem('pinned') || '[]'));

function togglePin(id, e) {
  e.stopPropagation();
  pinned.has(id) ? pinned.delete(id) : pinned.add(id);
  localStorage.setItem('pinned', JSON.stringify([...pinned]));
  render();
}

// ── KEYBINDINGS ───────────────────────────────
let keybindings = JSON.parse(localStorage.getItem('keybindings') || '{}');
let pendingKeyAssign = null;

function startKeyAssign(id, e) {
  e.stopPropagation();
  if (pendingKeyAssign === id) { cancelKeyAssign(); return; }
  cancelKeyAssign();
  pendingKeyAssign = id;
  const btn = document.querySelector(`#card-${id} .card-key`);
  if (btn) { btn.textContent = '…'; btn.classList.add('assigning'); }
}

function cancelKeyAssign() {
  if (!pendingKeyAssign) return;
  const btn = document.querySelector(`#card-${pendingKeyAssign} .card-key`);
  if (btn) {
    btn.textContent = keybindings[pendingKeyAssign] || '+';
    btn.classList.remove('assigning');
  }
  pendingKeyAssign = null;
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') { cancelKeyAssign(); return; }

  const label = e.key.length === 1 ? e.key.toUpperCase() : e.key;

  if (pendingKeyAssign) {
    e.preventDefault();
    Object.keys(keybindings).forEach(k => { if (keybindings[k] === label) delete keybindings[k]; });
    keybindings[pendingKeyAssign] = label;
    localStorage.setItem('keybindings', JSON.stringify(keybindings));
    pendingKeyAssign = null;
    render();
    return;
  }

  const entry = Object.entries(keybindings).find(([, k]) => k === label);
  if (entry) {
    const sound = sounds.find(s => s.id === entry[0]);
    if (sound) { e.preventDefault(); playSound(sound.id, '/sounds/' + sound.filename); }
  }
});

// ── DURATIONS ─────────────────────────────────
const durations = {};

function loadDurations(list) {
  list.forEach(s => {
    if (s.id in durations) return;
    durations[s.id] = '';
    const a = new Audio('/sounds/' + s.filename);
    a.addEventListener('loadedmetadata', () => {
      durations[s.id] = isFinite(a.duration) ? fmtDur(a.duration) : '';
      const el = document.getElementById('dur-' + s.id);
      if (el) el.textContent = durations[s.id];
    });
  });
}

function fmtDur(s) {
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ── INIT ──────────────────────────────────────
document.getElementById('volSlider').value = globalVolume;
loadSounds();
</script>
